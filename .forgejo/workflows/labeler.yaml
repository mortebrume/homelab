---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Labeler

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  main:
    name: Labeler - Labeler
    runs-on: ubuntu-latest
    if: ${{ forgejo.event.pull_request.head.repo.full_name == forgejo.repository }}
    steps:
      - name: Labeler
        uses: https://github.com/actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
        with:
          repo-token: ${{ secrets.MISTGAZER_TOKEN }}
          configuration-path: .forgejo/labeler.yaml
