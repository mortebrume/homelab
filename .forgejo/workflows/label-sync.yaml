---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Label Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .forgejo/labels.yaml
      # schedule:
      #   - cron: 0 0 * * *

jobs:
  main:
    name: Label Sync - Sync Labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: .forgejo/labels.yaml

      - name: Sync Labels
        uses: https://github.com/EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2.3.3
        with:
          config-file: .forgejo/labels.yaml
          delete-other-labels: true
