---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        DISCORD_WEBHOOK_URL: "{{ .DISCORD_WEBHOOK_URL }}"
  dataFrom:
    - extract:
        key: alertmanager
