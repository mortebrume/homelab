---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/operator.victoriametrics.com/vmalertmanagerconfig_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: alertmanager-config
  namespace: observability
spec:
  route:
    group_by:
      - alertname
      - namespace
    group_interval: 5m
    group_wait: 30s
    receiver: discord
    repeat_interval: 4h
    routes:
      - receiver: blackhole
        matchers:
          - alertname = InfoInhibitor
      - receiver: blackhole
        group_wait: 0s
        group_interval: 5m
        repeat_interval: 5m
        matchers:
          - alertname = Watchdog
      - receiver: discord
        matchers:
          - severity = critical
          - severity = warning
  receivers:
    - name: blackhole
    - name: discord
      discord_configs:
        - send_resolved: true
          title: |-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}🔥{{ else if eq .CommonLabels.severity "warning" }}⚠️{{ else }}ℹ️{{ end }}{{ else }}✅{{ end }} {{ if ne .CommonAnnotations.summary ""}}{{ .CommonAnnotations.summary }} {{ else if ne .CommonAnnotations.message ""}}{{ .CommonAnnotations.message }} {{ else if ne .CommonAnnotations.description ""}}{{ .CommonAnnotations.description }} {{ else }}{{ .CommonLabels.alertname }}{{ end }}
          message: |-
            {{ range .Alerts -}}
              **Alert:** {{ .Annotations.title }}{{ if .Labels.severity }} - `{{ .Labels.severity }}`{{ end }}

              {{ if ne .Annotations.summary ""}}**Summary:** {{ .Annotations.summary }} {{ else if ne .Annotations.message ""}}**Message:** {{ .Annotations.message }} {{ else if ne .Annotations.description ""}}**Description:** {{ .Annotations.description }}{{ end }}

              🏷 Labels:
              {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
              {{ end }}
            {{ end }}
          webhook_url_secret:
            name: alertmanager
            key: DISCORD_WEBHOOK_URL
  inhibit_rules:
    - equal:
        - namespace
      source_matchers:
        - alertname = InfoInhibitor
      target_matchers:
        - severity = info
