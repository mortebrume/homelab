---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/grafana/operator
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
spec:
  components:
    - ../../../../components/oidc
  dependsOn:
    - name: grafana-operator
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/observability/grafana/instance
  postBuild:
    substitute:
      APP: grafana
      NAMESPACE: observability
      OIDC_CALLBACK: /login/generic_oauth
      OIDC_DISPLAY_NAME: Grafana
      OIDC_GROUP: admins
      OIDC_CLAIM_MAPS: |
        {
          "grafana_role": {
            "joinType": "array",
            "valuesByGroup": {
              "admins@idm.mortebrume.eu": ["GrafanaAdmin"]
            }
          }
        }
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
