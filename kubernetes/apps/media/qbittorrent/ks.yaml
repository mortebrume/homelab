---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qbittorrent
spec:
  components:
    - ../../../../components/kopiur
    - ../../../../components/oidc/envoy
    - ../../../../components/volsync/hot
  dependsOn:
    - name: openebs
      namespace: openebs-system
    - name: media-storage
      namespace: media
  interval: 1h
  path: ./kubernetes/apps/media/qbittorrent/app
  postBuild:
    substitute:
      APP: qbittorrent
      KOPIUR_CAPACITY: 2Gi
      NAMESPACE: media
      OIDC_DISPLAY_NAME: qBittorrent
      OIDC_GROUP: admins
      OIDC_SCOPES: '["openid", "profile"]'
      SUBDOMAIN: qbittorrent
      VOLSYNC_CAPACITY: 2Gi
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
