---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: yspotify
spec:
  chartRef:
    kind: OCIRepository
    name: yspotify
  interval: 1h
  values:
    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/yooooomi/your_spotify_server
              tag: 1.18.0@sha256:80285f518dc8b6a8392986419503e1b804f62cc235d80fec6ce5e052264605ad
            env:
              API_ENDPOINT: &apiEndpoint https://ys.mortebrume.eu/api
              CLIENT_ENDPOINT: https://ys.mortebrume.eu
              PORT: &serverPort 8080
              MONGO_NO_ADMIN_RIGHTS: "true"
            envFrom:
              - secretRef:
                  name: yspotify
              - secretRef:
                  name: yspotify-db
            probes: &probes
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 500Mi
      web:
        containers:
          app:
            image:
              repository: ghcr.io/yooooomi/your_spotify_client
              tag: 1.18.0@sha256:e1379587e48a006e18b1eb3752bb6b6869f6518c29706d487f88083a1c8eab89
            env:
              API_ENDPOINT: *apiEndpoint
            probes: *probes
            securityContext: *securityContext
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 100Mi
    service:
      server:
        controller: server
        ports:
          http:
            port: *serverPort
      web:
        controller: web
        ports:
          http:
            port: &webPort 3000
    route:
      app:
        hostnames:
          - ys.mortebrume.eu
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - identifier: server
                port: *serverPort
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: web
                port: *webPort
