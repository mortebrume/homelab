---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-mcp
spec:
  dependsOn:
    - name: toolhive-config
      namespace: ai
  interval: 1h
  path: ./kubernetes/apps/ai/mcp/github-mcp/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
