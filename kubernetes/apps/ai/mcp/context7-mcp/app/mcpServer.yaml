---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: context7
spec:
  image: ghcr.io/stacklok/dockyard/npx/context7:2.2.4
  transport: stdio
  proxyPort: 8080
  groupRef:
    name: mcp-tools
  permissionProfile:
    type: builtin
    name: network
  secrets:
    - name: context7-api-key
      key: token
      targetEnvName: CONTEXT7_API_KEY
