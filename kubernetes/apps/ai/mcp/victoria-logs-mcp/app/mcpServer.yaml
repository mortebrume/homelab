---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: victoria-logs
spec:
  image: ghcr.io/victoriametrics/mcp-victorialogs:v1.9.0
  transport: streamable-http
  mcpPort: 8081
  groupRef:
    name: mcp-tools
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: MCP_SERVER_MODE
      value: http
    - name: MCP_LISTEN_ADDR
      value: :8081
    - name: MCP_LOG_FORMAT
      value: json
    - name: MCP_LOG_LEVEL
      value: info
    - name: VL_INSTANCE_ENTRYPOINT
      value: http://vlsingle-vl.observability.svc.cluster.local:9428
