---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vmcp-auth-server
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        signingKey: "{{ .AUTH_SERVER_SIGNING_KEY }}"
        hmacKey: "{{ .AUTH_SERVER_HMAC_KEY }}"
  dataFrom:
    - extract:
        key: toolhive
