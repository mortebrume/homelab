---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: mortebrume
  namespace: renovate
spec:
  discoveryFilters:
    - mortebrume/*
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: "['pnpm run bundle']"
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.database.svc:6379/4"
  image: ghcr.io/renovatebot/renovate:43.93.0
  parallelism: 5
  provider:
    name: forgejo
    endpoint: https://code.mortebrume.eu/api/v1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 * * * * # Every hour
  secretRef: renovate
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate
        key: WEBHOOK_TOKEN
