---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-host-key
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        host_key: "{{ .HOST_KEY_PRIV }}"
  dataFrom:
    - extract:
        key: forgejo
---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        ed25519: |
          {{ .SIGNING_KEY_PRIV }}
        ed25519.pub: |
          {{ .SIGNING_KEY_PUB }}
  dataFrom:
    - extract:
        key: forgejo
