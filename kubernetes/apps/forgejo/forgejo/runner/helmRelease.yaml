---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  interval: 1h
  values:
    controllers:
      forgejo-runner:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /persistent
              name: persistent
              size: 1Gi
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        initContainers:
          register-runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: latest@sha256:b6bfcf90d4eb2496dcadbc0aa9f640413370f80a23d69dca6bdc77cfdc284e0c
            command:
              - sh
              - -c
              - |
                if [ -f /persistent/.runner ]; then
                  echo "Runner already registered, skipping"
                  exit 0
                fi
                echo "Registering runner..."
                cd /persistent && forgejo-runner register \
                  --instance http://forgejo-http.forgejo.svc.cluster.local:3000 \
                  --token "${RUNNER_TOKEN}" \
                  --name k8s-runner \
                  --labels "default:k8spod:/config/podspec-default.yaml" \
                  --no-interactive
            envFrom:
              - secretRef:
                  name: forgejo-runner-secret
        containers:
          k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: sha-f7ab06b75887e5497c9f9f9bef641aafb2ae3e1c
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: sha-63d5504927ba6b9d511c0972beaf4ff5b3705f82
            command:
              - /bin/forgejo-runner
              - daemon
              - --config
              - /config/runner.yaml
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    persistence:
      config:
        type: configMap
        name: forgejo-runner-config
        globalMounts:
          - path: /config
      plugin:
        type: emptyDir
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
    rbac:
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - create
                - get
                - delete
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get
    serviceAccount:
      forgejo-runner: {}
