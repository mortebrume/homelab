---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        token: "{{ .RUNNER_TOKEN }}"
        uuid: "{{ .RUNNER_UUID }}"
  dataFrom:
    - extract:
        key: forgejo
