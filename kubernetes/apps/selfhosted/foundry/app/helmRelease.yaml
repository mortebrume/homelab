---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foundry
spec:
  chartRef:
    kind: OCIRepository
    name: foundry
  interval: 1h
  values:
    controllers:
      foundry:
        forceRename: foundry
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            env:
              CONTAINER_PRESERVE_CONFIG: "true"
              FOUNDRY_HOSTNAME: &hostname vtt.mortebrume.eu
              FOUNDRY_PROXY_SSL: "true"
              TZ: Europe/Paris
            envFrom:
              - secretRef:
                  name: foundry
            image:
              repository: ghcr.io/felddy/foundryvtt
              tag: 14.360.0@sha256:383417dbf3c442a03dcca9a4813b47c7408addaf6d582b7d3b1ee4b65c24a245
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 5Gi
      proxy:
        containers:
          app:
            image:
              repository: ghcr.io/mrprimate/ddb-proxy
              tag: 0.0.25@sha256:8dc2d7fb460f5f30e538a2e1b61a96501b6bef3945d92ae86481e69d26ec09e9
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: foundry
        forceRename: foundry
        primary: true
        ports:
          http:
            port: &port 30000
      proxy:
        controller: proxy
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - *hostname
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      proxy:
        hostnames:
          - vtt-proxy.mortebrume.eu
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: proxy
                port: 3000
    persistence:
      data:
        existingClaim: foundry
