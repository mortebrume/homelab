---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mealie
spec:
  components:
    - ../../../../components/oidc
    - ../../../../components/postgres/cert
    - ../../../../components/volsync
  dependsOn:
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/selfhosted/mealie/app
  postBuild:
    substitute:
      APP: mealie
      NAMESPACE: selfhosted
      OIDC_CALLBACK: /login
      OIDC_DISPLAY_NAME: Mealie
      OIDC_LEGACY_CRYPTO: "true"
      OIDC_SHORT_USERNAME: "true"
      VOLSYNC_CAPACITY: 1Gi
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false
