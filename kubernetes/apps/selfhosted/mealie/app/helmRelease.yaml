---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: mealie
  interval: 1h
  values:
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.15.2@sha256:3f1a1bf58774f9b211b91a1f4d30a4a34e1159e6c0dcb6849b3a1067bcb6858e
            env:
              ALLOW_PASSWORD_LOGIN: "false"
              BASE_URL: https://mealie.mortebrume.eu
              DB_ENGINE: postgres
              LOG_CONFIG_OVERRIDE: /config/logconf.json
              OIDC_AUTH_ENABLED: "true"
              OIDC_CONFIGURATION_URL: https://auth.mortebrume.eu/application/o/mealie/.well-known/openid-configuration
              OIDC_ADMIN_GROUP: Mealie-Admins
              OIDC_USER_GROUP: Mealie-Users
              OIDC_PROVIDER_NAME: Authentik
              OIDC_AUTO_REDIRECT: "true"
              OIDC_REMEMBER_ME: "true"
              TZ: Europe/Paris
              POSTGRES_URL_OVERRIDE:
                valueFrom:
                  secretKeyRef:
                    name: mealie-postgres
                    key: url
            envFrom:
              - secretRef:
                  name: mealie
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 9000
    route:
      app:
        hostnames:
          - mealie.mortebrume.eu
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        type: configMap
        name: mealie-configmap
        globalMounts:
          - path: /config/logconf.json
            subPath: logconf.json
      data:
        existingClaim: mealie
        globalMounts:
          - path: /app/data
