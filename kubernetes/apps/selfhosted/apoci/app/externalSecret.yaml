---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apoci
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        APOCI_REGISTRY_TOKEN: "{{ .REGISTRY_TOKEN }}"
        APOCI_ADMIN_TOKEN: "{{ .ADMIN_TOKEN }}"
  dataFrom:
    - extract:
        key: apoci
