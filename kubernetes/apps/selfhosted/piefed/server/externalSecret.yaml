---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: piefed
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        S3_ACCESS_KEY: "{{ .S3_ACCESS_KEY_ID }}"
        S3_ACCESS_SECRET: "{{ .S3_SECRET_ACCESS_KEY }}"
        S3_BUCKET: "{{ .S3_BUCKET }}"
        S3_ENDPOINT: "{{ .S3_ENDPOINT }}"
        S3_PUBLIC_URL: "{{ .S3_PUBLIC_URL }}"
        S3_REGION: "{{ .S3_REGION }}"
        S3_STORAGE_CLASS: ""
        SECRET_KEY: "{{ .SECRET_KEY }}"
  dataFrom:
    - extract:
        key: piefed
