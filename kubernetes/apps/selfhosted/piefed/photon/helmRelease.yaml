---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: photon
spec:
  chartRef:
    kind: OCIRepository
    name: photon
  interval: 1h
  values:
    controllers:
      photon:
        containers:
          app:
            image:
              repository: ghcr.io/xyphyn/photon
              tag: v2.3.1@sha256:f9632bcbb1f6c4d0822f15828b95935145122681459729bdd56dba4273e6defd
            env:
              PUBLIC_INSTANCE_URL: cie.mortebrume.eu
              PUBLIC_INSTANCE_TYPE: piefedalpha
              PUBLIC_SSR_ENABLED: false
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 56Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - photon.mortebrume.eu
    service:
      app:
        ports:
          http:
            port: 3000
