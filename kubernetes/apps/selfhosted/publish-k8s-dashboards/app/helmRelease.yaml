---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: publish-k8s-dashboards
spec:
  chartRef:
    kind: OCIRepository
    name: publish-k8s-dashboards
  interval: 1h
  values:
    controllers:
      publish-k8s-dashboards:
        type: cronjob
        cronjob:
          backoffLimit: 0
          concurrencyPolicy: "Replace"
          failedJobsHistory: 1
          schedule: "30 */4 * * *" # Every 4 hours (offset from schemas)
          successfulJobsHistory: 0
        initContainers:
          render-dashboards:
            image:
              repository: alpine/git
              tag: v2.47.2
            command:
              - sh
            args:
              - -c
              - exec sh /config/map/render-dashboards.sh
            env:
              - name: HOME
                value: /tmp
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
        containers:
          app:
            image:
              repository: ghcr.io/bjw-s-labs/wrangler
              tag: 4.78.0@sha256:bb9450fce0992b13b3b399f08a93e41af2d6e933c3597e9460916967763096f5
            envFrom:
              - secretRef:
                  name: publish-k8s-dashboards
            args:
              - deploy
              - --compatibility-date
              - "2026-01-31"
              - --assets
              - /data/dashboards
              - --name
              - k8s-dashboards
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    defaultPodOptions:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsGroup: 65534
        runAsUser: 65534
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          publish-k8s-dashboards:
            render-dashboards:
              - path: /tmp
                subPath: tmp
              - path: /data
                subPath: data
            app:
              - path: /config
                subPath: config
              - path: /data
                subPath: data
      config:
        type: configMap
        name: publish-k8s-dashboards
        advancedMounts:
          publish-k8s-dashboards:
            render-dashboards:
              - path: /config/map
                readOnly: true
