---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gotosocial
spec:
  chartRef:
    kind: OCIRepository
    name: gotosocial
  interval: 1h
  values:
    controllers:
      gotosocial:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/superseriousbusiness/gotosocial
              tag: 0.21.2@sha256:53106462f352c23c25a32d4bd5c03eb3c2198f2d2549ff1e7d5ef6deb7f44961
            env:
              TZ: Europe/Paris
              GTS_ACCOUNT_DOMAIN: mortebrume.eu
              GTS_APPLICATION_NAME: "brume's musings"
              GTS_HOST: social.mortebrume.eu
              GTS_LANDING_PAGE_USER: brume
              GTS_OIDC_ENABLED: "true"
              GTS_OIDC_IDP_NAME: "Authentik"
              GTS_OIDC_ISSUER: https://auth.mortebrume.eu/application/o/gotosocial/
              GTS_OIDC_ADMIN_GROUPS: GTS-Admins
              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_TRUSTED_PROXIES: "10.20.0.0/16,fd00::/48"
              GTS_METRICS_ENABLED: "true"
              OTEL_METRICS_PRODUCERS: prometheus
              OTEL_METRICS_EXPORTER: prometheus
              OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
              GOMEMLIMIT: "800MiB"
              GTS_DB_TYPE: postgres
              GTS_DB_POSTGRES_CONNECTION_STRING:
                valueFrom:
                  secretKeyRef:
                    name: gotosocial-postgres
                    key: url
            envFrom:
              - secretRef:
                  name: gotosocial
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 20m
                memory: 512Mi
              limits:
                memory: 1Gi
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            primary: true
            port: &port 8080
          metrics:
            primary: false
            port: 9464
    route:
      app:
        hostnames:
          - "social.mortebrume.eu"
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - cors:
                  allowHeaders:
                    - "*"
                  allowMethods:
                    - "*"
                  allowOrigins:
                    - "*"
                  maxAge: 86400
                type: CORS
      webfinger:
        hostnames:
          - "mortebrume.eu"
        parentRefs:
          - name: envoy-external
            namespace: network
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/webfinger
              - path:
                  type: Exact
                  value: /.well-known/host-meta
              - path:
                  type: Exact
                  value: /.well-known/nodeinfo
            backendRefs:
              - identifier: app
                port: *port
    persistence:
      storage:
        existingClaim: gotosocial
        globalMounts:
          - path: /storage
            subPath: data
      tmpfs:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /tmp
            subPath: tmp
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics
