---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sure
spec:
  components:
    - ../../../../components/oidc
    - ../../../../components/postgres/cert
  interval: 1h
  path: ./kubernetes/apps/selfhosted/sure/app
  postBuild:
    substitute:
      APP: sure
      NAMESPACE: selfhosted
      OIDC_CALLBACK: /auth/openid_connect/callback
      SUBDOMAIN: fin
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
