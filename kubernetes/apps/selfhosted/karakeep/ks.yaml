---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: karakeep
spec:
  components:
    - ../../../../components/oidc
    - ../../../../components/volsync
  dependsOn:
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/selfhosted/karakeep/app
  postBuild:
    substitute:
      APP: karakeep
      OIDC_CALLBACK: /api/auth/callback/custom
      OIDC_DISPLAY_NAME: Karakeep
      OIDC_LEGACY_CRYPTO: "true"
      NAMESPACE: selfhosted
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false
