[global]
server_name = "mortebrume.eu"
address = ["0.0.0.0"]
port = 8008

log = "info"

# DB settings
database_path = "/data"
database_backup_path = "/backups"
database_backups_to_keep = 1

rocksdb_compression_algo = "zstd"
rocksdb_compression_level = 32767
rocksdb_bottommost_compression_level = 32767
rocksdb_bottommost_compression = true

max_request_size = 20971520

# DNS Optimisation
dns_cache_entries = 1_000_000
dns_timeout = 60
query_over_tcp_only = true
ip_lookup_strategy = 3

# User settings
allow_encryption = true
allow_federation = true
allow_registration = true
new_user_displayname_suffix = ""
suspend_on_register = false

# Harden
allow_legacy_media = true
allow_public_room_directory_over_federation = false
lockdown_public_room_directory = true
require_auth_for_profile_requests = true
trusted_servers = ["bi-vibes.com", "codestorm.net"]

[global.ldap]
enable = true
ldap_only = false
disable_tls_verification = true
uri = "ldaps://kanidm.kanidm.svc.cluster.local:3636"
base_dn = "dc=idm,dc=mortebrume,dc=eu"
bind_dn = "dn=token"
bind_password_file = "/secrets/ldap-bind-password"
filter = "(memberOf=spn=users@idm.mortebrume.eu,dc=idm,dc=mortebrume,dc=eu)"
admin_filter = "(memberOf=spn=admins@idm.mortebrume.eu,dc=idm,dc=mortebrume,dc=eu)"
uid_attribute = "displayname"
name_attribute = "displayname"

[global.well_known]
client = "https://matrix.mortebrume.eu"
server = "matrix.mortebrume.eu:443"
