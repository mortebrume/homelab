---
# yaml-language-server: $schema=https://schemas.mortebrume.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      repo: forgejo://code.mortebrume.eu/mortebrume/homelab
      publicUrl: https://konflate.mortebrume.eu
      mcp: true
      prComments: true
      statusChecks: true
    secret:
      existingSecret: konflate
    httpRoute:
      enabled: true
      hostnames:
        - konflate.mortebrume.eu
      parentRefs:
        - name: envoy-internal
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
