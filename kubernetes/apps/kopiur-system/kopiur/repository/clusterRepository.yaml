---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: cloudflare
spec:
  allowedNamespaces:
    all: true
  backend:
    s3:
      auth:
        secretRef:
          name: kopiur-cloudflare
          namespace: kopiur-system
      bucket: homelab
      endpoint: 90ff6e0c7550a1d9899554d31f77ed04.r2.cloudflarestorage.com
      region: auto
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-cloudflare
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: policyName
  moverDefaults:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
  scheduleDefaults:
    timezone: Europe/Paris
  server:
    auth:
      insecure:
        acknowledgeInsecure: true
    namespace: kopiur-system
